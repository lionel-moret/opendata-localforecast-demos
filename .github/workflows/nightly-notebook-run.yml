name: Nightly notebook run

on:
  schedule:
    # Runs every day at 02:00 Switzerland time (CET/CEST ≈ 00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-notebooks:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install Poetry
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      # Step 4: Install dependencies using Poetry
      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-root

      # Step 5: Run all notebooks
      - name: Execute notebooks
        run: |
          mkdir -p executed_notebooks

          for notebook in notebooks/*.ipynb; do
            echo "Running $notebook"
            papermill "$notebook" "executed_notebooks/$(basename "$notebook")"
          done
