name: OGD Metadata Monitor

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Check for Metadata Changes
        id: check
        run: |
          # Find the script and print its location
          SCRIPT_PATH=$(find . -name "check_metadata.py" | head -n 1)
          if [ -z "$SCRIPT_PATH" ]; then
            echo "❌ Error: check_metadata.py not found in the repository!"
            exit 1
          fi
          echo "✅ Found script at: $SCRIPT_PATH"
          
          # Run the script
          python "$SCRIPT_PATH"
        continue-on-error: true

      - name: Create Issue on Change
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ OGD Metadata Change Detected',
              body: 'The OGD parameter metadata CSV has changed. This might require updates to the plot functions or parameter mappings in the notebooks.\n\nPlease review the changes and update the `metadata_reference.csv` in the repository.'
            })

      - name: Commit updated reference
        if: steps.check.outcome == 'failure'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Find the reference file and print its location
          REF_PATH=$(find . -name "metadata_reference.csv" | head -n 1)
          
          if [ -n "$REF_PATH" ]; then
            echo "✅ Found reference file to commit at: $REF_PATH"
            git add "$REF_PATH"
            git commit -m "chore: update metadata reference file"
            git push
          else
            echo "⚠️ No metadata_reference.csv found. If this is the first run, the script should have created it."
          fi
